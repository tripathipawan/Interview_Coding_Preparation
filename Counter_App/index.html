<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Counter App</h1>

    <div class="top-wrapper">
      <div id="num" class="top">0</div>
    </div>

    <div class="bottom">
      <button id="add" class="add btn">+ Add</button>
      <button id="sub" class="sub btn">− Sub</button>
      <button id="reset" class="reset btn">↺ Reset</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
