<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>BMI CALCULATOR</h1>
    <div class="top-box">
      <input type="number" class="input height" placeholder="Enter height in cm..."><span>cm</span>
      <input type="number" class="input weight" placeholder="Enter weight in kg...">
      <span>kg</span>
    </div>
    <hr>
    <div class="middle-box">
      <p class="output">
        Result: <span class="result">????</span>
      </p>
      <p class="line">||</p>
      <p class="output">
        Category: <span class="category">????????</span>
      </p>
    </div>
    <hr>
    <div class="bottom-box">
      <button class="btn">Calculate</button>
    </div>
  </div>


  <script src="script.js"></script>
</body>

</html>
