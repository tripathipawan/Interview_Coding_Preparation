<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Slider</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <div class="img-box">
      <img class="img" alt="img1" src="https://picsum.photos/seed/1/600/300">
      <img class="img" alt="img2" src="https://picsum.photos/seed/2/600/300">
      <img class="img" alt="img3" src="https://picsum.photos/seed/3/600/300">
      <img class="img" alt="img4" src="https://picsum.photos/seed/4/600/300">
      <img class="img" alt="img5" src="https://picsum.photos/seed/5/600/300">
    </div>
    <div class="btn-box">
      <button class="prev">Prev</button>
      <button class="next">Next</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
